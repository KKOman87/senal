<style>:root{--bleed:1.7px}</style>
</head>
<body>
  <div class="turnon" id="turnon"></div>

  <div class="power" id="power">
    <div class="hint">canal 02 · orientación al ciudadano</div>
    <button id="powerBtn">▶ Sintonizar</button>
    <div class="hint" style="font-size:12px;opacity:.6">espacio de preguntas frecuentes</div>
  </div>

  <main class="tube" id="tube" aria-live="polite">
    <div class="grain"></div>
    <canvas class="snow" id="snow" aria-hidden="true"></canvas>
    <div class="track" id="track"></div>

    <header class="head">
      <span>Canal 02 · orientación</span>
      <span class="right">
        <span class="rec"><span class="dot"></span>AIRE</span>
        <span id="clock">--:--:--</span>
      </span>
    </header>

    <section class="tbody" id="tbody">
      <div class="label" id="label">Conectando con el estudio</div>
      <p class="msg" id="msg"><span class="cursor"></span></p>
    </section>

    <footer class="foot">
      <span class="left">
        <span id="status">Línea abierta</span>
        <button class="btn dim" id="mute">Sonido: on</button>
      </span>
      <a class="btn" data-go="index.html" href="index.html">Guía</a>
    </footer>
  </main>

<script src="assets/senal.js"></script>
<script>
(function(){
  var S = SENAL;

  var Q3 = '¿Quién transmite cuando no hay programación? — La pregunta fue retirada.';
  var GUION = [
    {label:'Orientación al ciudadano', text:'Este espacio responde las preguntas frecuentes sobre el servicio.'},
    {label:'Pregunta uno', text:'¿Por qué mi televisor se enciende solo? — No se enciende solo. Usted lo deja esperando.'},
    // el fragmento «SEÑAL» se escribe y se borra en la pausa de tipeo
    {label:'Pregunta dos', text:Q3, ghost:{word:'SEÑAL ', at:Q3.indexOf('pregunta fue')}},
    {label:'Pregunta tres', text:'¿Es normal escuchar mi nombre en la estática? — Sí. La segunda palabra es la que importa.'},
    {label:'Orientación al ciudadano', text:'No hay más preguntas por hoy. Las suyas ya fueron registradas.', hold:3200}
  ];

  S.page({
    ch: 2,
    audio: {
      master: 0.5,
      hum: [[60,0.015],[120,0.009],[50,0.006]],
      hiss: {gain:0.014, hp:1100},
      shimmer: {freq:7900, gain:0.0024},
      dropouts: {min:5000, max:12000, depth:0.15}
    },
    fx: {
      eyes: {gain:0.75, min:13000, max:34000}
    },
    onAir: function(els){
      S.snow(els.snow, {intensity:0.07, fps:15});
      S.typer({
        msgEl: els.msg, labelEl: els.label, guion: GUION,
        corruption: 0.06, tube: els.tube, track: els.track,
        onDone: function(){ els.status.textContent = 'Línea cerrada · registrado'; }
      });
    }
  });
})();
</script>
</body>

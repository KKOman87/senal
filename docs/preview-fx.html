<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>SEÑAL — preview de efectos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/senal.css">
<style>
  body{flex-direction:column;gap:18px;padding:20px}
  .pv-tube{width:min(820px,94vw);height:min(520px,70vh)}
  .pv-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:820px}
  .pv-note{color:var(--bone-dim);font-size:13px;letter-spacing:.14em;text-transform:uppercase;text-align:center;max-width:680px}
  .pv-bar .btn{cursor:var(--reticle-lock)}
</style>
</head>
<body>
  <div class="pv-note">Preview de efectos · no es parte del juego · enciende el sonido para el stinger</div>

  <main class="tube pv-tube" id="tube">
    <div class="grain"></div>
    <canvas class="snow" id="snow" aria-hidden="true"></canvas>
    <div class="track" id="track"></div>
    <header class="head">
      <span>Preview · efectos animatrónicos</span>
      <span class="right"><span class="rec"><span class="dot"></span>DEMO</span></span>
    </header>
    <section class="tbody" id="tbody">
      <div class="label">Vigílalo</div>
      <p class="msg">Algo te mira desde la nieve.</p>
    </section>
    <footer class="foot">
      <span class="left"><button class="btn dim" id="mute">Sonido: on</button></span>
      <span>repetidora local</span>
    </footer>
  </main>

  <div class="pv-bar">
    <button class="btn" data-fx="eyes">Ojos</button>
    <button class="btn" data-fx="silhouette">Silueta</button>
    <button class="btn" data-fx="cam">Cámara</button>
    <button class="btn" data-fx="face">Cara</button>
    <button class="btn dim" data-fx="all">Todo en bucle</button>
  </div>

  <script src="assets/senal.js"></script>
  <script>
    var S = SENAL, tube = document.getElementById('tube');
    tube.classList.add('on');
    S.snow(document.getElementById('snow'), {intensity:0.16, fps:18});

    // audio mínimo para que el stinger de la cara suene
    S.buildAudio({master:0.4, hum:[[60,0.012],[120,0.008]], hiss:{gain:0.012, hp:1100}});
    var mute = document.getElementById('mute');
    function paintMute(){ mute.textContent = 'Sonido: ' + (S.state.m ? 'off' : 'on'); }
    paintMute();
    mute.addEventListener('click', function(){ S.setMuted(!S.state.m); paintMute(); });

    // dispara un efecto una sola vez, casi inmediato (force = ignora reduced-motion)
    function fire(kind){
      var cfg = {};
      if (kind === 'eyes')       cfg.eyes = {gain:0.95, size:1.3, first:200, min:99999, max:99999};
      if (kind === 'silhouette') cfg.silhouette = {opacity:0.6, first:200, min:99999, max:99999};
      if (kind === 'cam')        cfg.cam = {id:'PV', note:'PREVIEW', first:200, min:99999, max:99999};
      if (kind === 'face')       cfg.face = {first:200, min:99999, max:99999};
      S.startFx(tube, cfg, true);
    }

    document.querySelector('.pv-bar').addEventListener('click', function(e){
      var b = e.target.closest('[data-fx]'); if (!b) return;
      var k = b.getAttribute('data-fx');
      if (k === 'all') {
        S.startFx(tube, {
          eyes:{gain:0.95, size:1.25, first:600, min:3000, max:6000},
          silhouette:{opacity:0.6, first:2200, min:5000, max:9000},
          cam:{id:'PV', note:'PREVIEW', first:1400, min:5000, max:9000},
          face:{first:4000, min:8000, max:13000}
        }, true);
      } else fire(k);
    });
  </script>
</body>
</html>

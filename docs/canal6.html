<style>
:root{--bleed:2.8px}
.teflash{
  position:absolute;inset:0;z-index:12;display:none;align-items:center;justify-content:center;
  background:var(--bone);color:var(--void);
  font-family:'Spectral',serif;font-weight:600;font-size:clamp(80px,22vw,210px);
}
.teflash.go{display:flex}
</style>
</head>
<body>
  <div class="turnon" id="turnon"></div>

  <div class="power" id="power">
    <div class="hint">esta posición no está asignada</div>
    <button id="powerBtn">▶ Entrar igual</button>
    <div class="hint" style="font-size:12px;opacity:.6">quedan pocos minutos</div>
  </div>

  <main class="tube" id="tube" aria-live="polite">
    <div class="grain"></div>
    <canvas class="snow" id="snow" aria-hidden="true"></canvas>
    <div class="track" id="track"></div>
    <div class="teflash" id="teflash" aria-hidden="true">TE</div>

    <header class="head">
      <span>Canal ·6· · ——</span>
      <span class="right">
        <span class="rec"><span class="dot"></span>¿AIRE?</span>
        <span id="clock">--:--:--</span>
      </span>
    </header>

    <section class="tbody" id="tbody">
      <div class="label" id="label">——</div>
      <p class="msg" id="msg"><span class="cursor"></span></p>
    </section>

    <footer class="foot">
      <span class="left">
        <span id="status">Ventana: 03:00–03:33</span>
        <button class="btn dim" id="mute">Sonido: on</button>
      </span>
      <a class="btn" data-go="index.html" href="index.html">Guía</a>
    </footer>
  </main>

<script src="assets/senal.js"></script>
<script>
(function(){
  var S = SENAL;
  var typing = null, snowing = null, dead = false;

  var GUION = [
    {label:'——', text:'No deberías poder ver esto.', hold:2400},
    {label:'——', text:'Este canal no aparece en la guía. Lo sabes. Lo comprobaste.'},
    {label:'——', text:'Treinta y tres minutos. Es todo lo que nos dan. No preguntes quién.'},
    {label:'——', text:'La palabra que guardamos aquí es corta. Es la que usamos para hablarte.'},
    {label:'——', text:'Te la enseño cuando parpadees. No parpadees todavía.', hold:2600},
    {label:'——', text:'Ahora.', hold:1400},
    {label:'——', text:'Sexta palabra. Vete antes de que el reloj diga treinta y cuatro.', hold:4000}
  ];

  function flashTE(els){
    var f = document.getElementById('teflash');
    if (S.reduce){ // sin estrobo: aparece una vez, quieta, y se va
      f.classList.add('go');
      setTimeout(function(){ f.classList.remove('go'); }, 1800);
      return;
    }
    f.classList.add('go');
    els.tube.classList.add('invert');
    setTimeout(function(){
      f.classList.remove('go');
      els.tube.classList.remove('invert');
      S.roll(els.tube);
    }, 380);
  }

  function morir(els){
    if (dead) return;
    dead = true;
    if (typing) typing.stop();
    S.killAudio(1.2);
    if (snowing) snowing.stop();
    S.snow(els.snow, {intensity:0.85, fps:20});
    els.tbody.innerHTML =
      '<div class="locked"><div class="nosig">Se acabó</div>' +
      '<p class="pista">treinta y tres minutos. ni uno más. ya sabes dónde estaremos mañana.</p></div>';
    els.status.textContent = 'Ventana cerrada';
  }

  var res = S.page({
    ch: 6,
    audio: {
      master: 0.55,
      hum: [[50,0.014],[60,0.010],[100,0.008]],
      hiss: {gain:0.030, hp:600},
      heartbeat: {bpm:54, gain:0.5},
      voices: [{f0:104, gain:0.045},{f0:131, gain:0.035}],
      dropouts: {min:2500, max:6000, depth:0.06}
    },
    fx: {
      cam: {id:'06', note:'CANAL NO LISTADO · 03:00–03:33', min:6000, max:15000},
      silhouette: {opacity:0.4, min:11000, max:26000}
    },
    onAir: function(els){
      snowing = S.snow(els.snow, {intensity:0.24, fps:19});
      typing = S.typer({
        msgEl: els.msg, labelEl: els.label, guion: GUION,
        corruption: 0.4, tube: els.tube, track: els.track,
        onLine: function(n){ if (n === 5) flashTE(els); },
        onDone: function(){ els.status.textContent = 'Cierra antes de que cierre'; }
      });
    }
  });

  // a las 03:34 el canal deja de existir, aunque estés mirando
  if (res.open){
    setInterval(function(){
      if (!S.isUnlocked(6, new Date(), S.state.v)) morir(res.els);
    }, 4000);
  }
})();
</script>
</body>
</html>

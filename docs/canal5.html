<style>
:root{--bleed:2.2px}
#msg{font-family:'VT323',monospace;letter-spacing:.14em}
</style>
</head>
<body>
  <div class="turnon" id="turnon"></div>

  <div class="power" id="power">
    <div class="hint">canal 05 · estación de números</div>
    <button id="powerBtn">▶ Sintonizar</button>
    <div class="hint" style="font-size:12px;opacity:.6">onda corta · destinatario desconocido</div>
  </div>

  <main class="tube" id="tube" aria-live="polite">
    <div class="grain"></div>
    <canvas class="snow" id="snow" aria-hidden="true"></canvas>
    <div class="track" id="track"></div>

    <header class="head">
      <span>Canal 05 · números</span>
      <span class="right">
        <span class="rec"><span class="dot"></span>AIRE</span>
        <span id="clock">--:--:--</span>
      </span>
    </header>

    <section class="tbody" id="tbody">
      <div class="label" id="label">Buscando portadora</div>
      <p class="msg" id="msg"><span class="cursor"></span></p>
    </section>

    <footer class="foot">
      <span class="left">
        <span id="status">Frecuencia prestada</span>
        <button class="btn dim" id="mute">Sonido: on</button>
      </span>
      <a class="btn" data-go="index.html" href="index.html">Guía</a>
    </footer>
  </main>

<script src="assets/senal.js"></script>
<script>
(function(){
  var S = SENAL;

  var GUION = [
    {label:'Estación de números', text:'Atención. Atención. Serie para el oyente sin nombre.'},
    {label:'Serie uno', text:'7 · 7 · 0 · 4 · 7 · 7 · 0 · 4', hold:2400},
    // «CUANDO» contado con el alfabeto: C=3 U=21 A=1 N=14 D=4 O=15
    {label:'Serie dos', text:'3 · 21 · 1 · 14 · 4 · 15', hold:4200},
    {label:'Clave', text:'La serie dos no es una serie. Es una palabra contada con los dedos del alfabeto.'},
    {label:'Estación de números', text:'Fin de la emisión. Repetimos cada madrugada hasta que alguien conteste.', hold:3400}
  ];

  S.page({
    ch: 5,
    audio: {
      master: 0.5,
      hum: [[50,0.012],[100,0.008]],
      hiss: {gain:0.028, hp:700},
      shimmer: {freq:6800, gain:0.0030},
      // señal de intervalo: campanita de estación de números
      interval: {notes:[988,784,880,659], dur:0.42, gap:11, gain:0.038, detune:16},
      // murmullo que casi articula, muy al fondo
      voices: [{f0:96, gain:0.022}],
      dropouts: {min:3000, max:8000, depth:0.1}
    },
    onAir: function(els){
      S.snow(els.snow, {intensity:0.12, fps:17});
      S.typer({
        msgEl: els.msg, labelEl: els.label, guion: GUION,
        corruption: 0.18, tube: els.tube, track: els.track,
        onLine: function(n){ if (n === 2) S.glitch(els.tube); },
        onDone: function(){ els.status.textContent = 'Repetición programada · 00:00–05:00'; }
      });
    }
  });
})();
</script>
</body>

</head>
<body>
  <div class="turnon" id="turnon"></div>

  <div class="power" id="power">
    <div class="hint">canal 01 · boletín de servicio</div>
    <button id="powerBtn">▶ Sintonizar</button>
    <div class="hint" style="font-size:12px;opacity:.6">emisión regular · audio recomendado</div>
  </div>

  <main class="tube" id="tube" aria-live="polite">
    <div class="grain"></div>
    <canvas class="snow" id="snow" aria-hidden="true"></canvas>
    <div class="track" id="track"></div>

    <header class="head">
      <span>Canal 01 · boletín de servicio</span>
      <span class="right">
        <span class="rec"><span class="dot"></span>AIRE</span>
        <span id="clock">--:--:--</span>
      </span>
    </header>

    <section class="tbody" id="tbody">
      <div class="label" id="label">Señal estable</div>
      <p class="msg" id="msg"><span class="cursor"></span></p>
    </section>

    <footer class="foot">
      <span class="left">
        <span id="status">Emisión regular</span>
        <button class="btn dim" id="mute">Sonido: on</button>
      </span>
      <a class="btn" data-go="index.html" href="index.html">Guía</a>
    </footer>
  </main>

<script src="assets/senal.js"></script>
<script>
(function(){
  var S = SENAL;

  var GUION = [
    {label:'Boletín de servicio', text:'Buenos días. Esta es la emisión regular del servicio público de señal.'},
    {label:'Avisos', text:'Se recuerda a los vecinos mantener sus receptores encendidos durante las horas de luz.'},
    {label:'Avisos', text:'El corte de fluido programado fue completado anoche, entre las tres y las tres y media.'},
    {label:'Servicio', text:'Si su aparato presenta interferencia, no lo apague. La interferencia también es información.'},
    {label:'Boletín de servicio', text:'Gracias por sintonizarnos. Sabemos que algunos escuchan con más atención que otros.'},
    {label:'——', text:'A esos: el resto del horario también les pertenece. Empiecen por la primera palabra.', hold:3200}
  ];

  S.page({
    ch: 1,
    audio: {
      master: 0.5,
      hum: [[60,0.014],[120,0.008],[50,0.006]],
      hiss: {gain:0.010, hp:1200},
      shimmer: {freq:8200, gain:0.0022},
      dropouts: {min:7000, max:16000, depth:0.25}
    },
    onAir: function(els){
      S.snow(els.snow, {intensity:0.04, fps:14});

      // el fragmento «LA» vive en los cuadros de glitch del rótulo
      function flashLA(){
        var prev = els.label.textContent;
        els.label.textContent = '· LA ·';
        S.glitch(els.tube);
        setTimeout(function(){ els.label.textContent = prev; }, S.reduce ? 1400 : 340);
      }
      setInterval(flashLA, 16000);

      S.typer({
        msgEl: els.msg, labelEl: els.label, guion: GUION,
        corruption: 0.02, tube: els.tube, track: els.track,
        onLine: function(n){ if (n === 4) setTimeout(flashLA, 900); },
        onDone: function(){ els.status.textContent = 'Emisión en bucle · canal 01'; }
      });
    }
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEÑAL — transmisión sin origen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#07070a;
    --cathode:#161208;
    --bone:#d8d2c4;
    --bone-dim:#7e796d;
    --amber:#c9923c;
    --amber-deep:#6e4f1c;
    --bleed-r:#ff2d3b;
    --bleed-c:#1fd6ff;
    --rec:#e0463c;
    /* reticle "locked-on" para elementos clickeables */
    --reticle-lock:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2728%27%20height%3D%2728%27%20viewBox%3D%270%200%2028%2028%27%3E%3Cg%20fill%3D%27none%27%20stroke%3D%27%23d8d2c4%27%20stroke-width%3D%271.6%27%3E%3Cpath%20d%3D%27M5%209V5h4M23%209V5h-4M5%2019v4h4M23%2019v4h-4%27%2F%3E%3C%2Fg%3E%3Ccircle%20cx%3D%2714%27%20cy%3D%2714%27%20r%3D%272%27%20fill%3D%27%23ff2d3b%27%2F%3E%3C%2Fsvg%3E") 14 14, pointer;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  /* cursor custom: reticle de sintonía (señal) en vez de la flecha del sistema */
  html,body,*{cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2728%27%20height%3D%2728%27%20viewBox%3D%270%200%2028%2028%27%3E%3Cg%20fill%3D%27none%27%20stroke%3D%27%23c9923c%27%20stroke-width%3D%271.4%27%20opacity%3D%270.95%27%3E%3Ccircle%20cx%3D%2714%27%20cy%3D%2714%27%20r%3D%278%27%2F%3E%3Cpath%20d%3D%27M14%201v6M14%2021v6M1%2014h6M21%2014h6%27%2F%3E%3C%2Fg%3E%3Ccircle%20cx%3D%2714%27%20cy%3D%2714%27%20r%3D%271.3%27%20fill%3D%27%23c9923c%27%2F%3E%3C%2Fsvg%3E") 14 14, crosshair}
  html,body{height:100%;background:var(--void);overflow:hidden}
  body{
    font-family:'VT323',monospace;color:var(--bone);
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 42%, var(--cathode) 0%, #0a0a0d 38%, var(--void) 78%);
  }

  /* ---------- pantalla de encendido ---------- */
  .power{
    position:fixed;inset:0;z-index:30;background:#020203;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    transition:opacity .6s ease;
  }
  .power.off{opacity:0;pointer-events:none}
  .power .hint{color:var(--bone-dim);letter-spacing:.34em;font-size:14px;text-transform:uppercase}
  .power button{
    font-family:'VT323',monospace;background:transparent;color:var(--amber);
    border:1px solid var(--amber-deep);padding:14px 40px;letter-spacing:.4em;
    text-transform:uppercase;font-size:20px;cursor:var(--reticle-lock);transition:.18s;
  }
  .power button:hover,.power button:focus-visible{background:var(--amber);color:#020203;outline:none}
  .power button:focus-visible{box-shadow:0 0 0 2px var(--bone)}

  /* línea de encendido del CRT */
  .turnon{position:fixed;inset:0;z-index:25;pointer-events:none;display:none;background:#020203}
  .turnon.go{display:block;animation:turnon .9s ease forwards}
  .turnon::after{
    content:"";position:absolute;left:0;right:0;top:50%;height:3px;background:var(--bone);
    box-shadow:0 0 24px 8px rgba(216,210,196,.7);transform:translateY(-50%) scaleX(1);
    animation:scanopen .9s ease forwards;
  }
  @keyframes turnon{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
  @keyframes scanopen{
    0%{transform:translateY(-50%) scaleX(.02);height:3px;opacity:0}
    18%{transform:translateY(-50%) scaleX(1);opacity:1}
    60%{height:3px}
    100%{height:100vh;opacity:0}
  }

  /* ---------- el tubo ---------- */
  .tube{
    position:relative;width:min(900px,94vw);height:min(620px,90vh);
    padding:clamp(22px,5vw,56px);display:flex;flex-direction:column;overflow:hidden;
    border-radius:8px / 18px;opacity:0;transition:opacity .8s ease .5s;
    box-shadow:inset 0 0 120px 30px rgba(0,0,0,.9),inset 0 0 18px rgba(201,146,60,.06),0 0 80px rgba(0,0,0,.8);
    animation:breathe 6.5s ease-in-out infinite;
  }
  .tube.on{opacity:1}
  @keyframes breathe{0%,100%{filter:brightness(1)}47%{filter:brightness(1.04)}50%{filter:brightness(.93)}53%{filter:brightness(1.04)}}
  .tube::before{
    content:"";position:absolute;inset:0;z-index:6;pointer-events:none;mix-blend-mode:multiply;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.28) 3px,rgba(0,0,0,.28) 4px);
  }
  .tube::after{
    content:"";position:absolute;inset:-2px;z-index:7;pointer-events:none;
    background:radial-gradient(120% 110% at 50% 50%, transparent 55%, rgba(0,0,0,.75) 100%);
  }
  .grain{
    position:absolute;inset:0;z-index:5;pointer-events:none;opacity:.06;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain .28s steps(3) infinite;
  }
  @keyframes grain{0%{transform:translate(0,0)}33%{transform:translate(-4px,3px)}66%{transform:translate(3px,-2px)}}
  .track{
    position:absolute;left:0;right:0;height:46px;z-index:8;pointer-events:none;top:-60px;
    background:linear-gradient(rgba(216,210,196,.05),rgba(216,210,196,.16),rgba(216,210,196,.05));
    mix-blend-mode:screen;filter:blur(.5px);
  }
  .track.go{animation:track 1.1s linear}
  @keyframes track{from{top:-60px}to{top:110%}}
  .tube.roll{animation:breathe 6.5s ease-in-out infinite, roll .5s linear}
  @keyframes roll{0%{transform:translateY(0)}40%{transform:translateY(-14px)}41%{transform:translateY(16px)}100%{transform:translateY(0)}}

  .head{
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--amber-deep);padding-bottom:8px;letter-spacing:.18em;
    font-size:clamp(13px,1.6vw,16px);color:var(--amber);text-transform:uppercase;
  }
  .head .right{display:flex;gap:16px;align-items:center;color:var(--bone-dim)}
  .rec{display:inline-flex;align-items:center;gap:7px;color:var(--rec)}
  .rec .dot{width:9px;height:9px;border-radius:50%;background:var(--rec);box-shadow:0 0 8px var(--rec);animation:blink 1.1s steps(1) infinite}

  .body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .label{font-size:clamp(12px,1.5vw,15px);letter-spacing:.34em;color:var(--amber);text-transform:uppercase;opacity:.85}
  .msg{
    font-family:'Spectral',serif;font-size:clamp(22px,3.6vw,40px);line-height:1.32;
    color:var(--bone);max-width:34ch;
    text-shadow:-1.4px 0 0 var(--bleed-r),1.4px 0 0 var(--bleed-c);
    animation:drift 5s ease-in-out infinite;
  }
  @keyframes drift{0%,100%{text-shadow:-1.4px 0 var(--bleed-r),1.4px 0 var(--bleed-c)}50%{text-shadow:-2.6px 0 var(--bleed-r),2.6px 0 var(--bleed-c)}}
  .msg .cursor{display:inline-block;width:.55ch;height:1em;background:var(--bone);vertical-align:-2px;margin-left:2px;animation:blink 1s steps(1) infinite;text-shadow:none}
  @keyframes blink{50%{opacity:0}}

  .foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--amber-deep);padding-top:10px;font-size:clamp(12px,1.5vw,15px);letter-spacing:.16em;color:var(--bone-dim)}
  .foot .left{display:flex;gap:18px;align-items:center}
  .mute{font-family:'VT323',monospace;background:transparent;color:var(--bone-dim);border:1px solid var(--amber-deep);padding:4px 12px;letter-spacing:.2em;text-transform:uppercase;font-size:13px;cursor:var(--reticle-lock)}
  .mute:hover,.mute:focus-visible{color:var(--amber);outline:none}
  .mute:focus-visible{box-shadow:0 0 0 2px var(--bone)}
  .ack{font-family:'VT323',monospace;background:transparent;color:var(--amber);border:1px solid var(--amber-deep);padding:7px 18px;letter-spacing:.28em;text-transform:uppercase;font-size:clamp(13px,1.6vw,16px);cursor:var(--reticle-lock);transition:.15s}
  .ack:hover,.ack:focus-visible{background:var(--amber);color:var(--void);outline:none}
  .ack:focus-visible{box-shadow:0 0 0 2px var(--bone)}
  .ack[disabled]{opacity:.35;cursor:default}

  .glitch{animation:shudder .14s steps(2) 3}
  @keyframes shudder{0%{transform:translate(0,0)}25%{transform:translate(3px,-2px) skewX(-1.5deg)}50%{transform:translate(-2px,1px)}75%{transform:translate(2px,2px) skewX(1deg)}}

  @media (prefers-reduced-motion: reduce){
    .tube,.msg,.grain,.track,.turnon,.turnon::after{animation:none!important}
    .msg .cursor,.rec .dot{animation:none}
    .tube{opacity:1}
  }
</style>
</head>
<body>
  <div class="turnon" id="turnon"></div>

  <div class="power" id="power">
    <div class="hint">señal entrante · sin origen verificable</div>
    <button id="powerBtn">▶ Encender</button>
    <div class="hint" style="font-size:12px;opacity:.6">audio recomendado</div>
  </div>

  <main class="tube" id="tube" aria-live="polite">
    <div class="grain"></div>
    <div class="track" id="track"></div>

    <header class="head">
      <span>Canal —— · sin licencia</span>
      <span class="right">
        <span class="rec"><span class="dot"></span>REC</span>
        <span id="clock">--:--:--</span>
      </span>
    </header>

    <section class="body">
      <div class="label" id="label">Decodificando señal</div>
      <p class="msg" id="msg"><span class="cursor"></span></p>
    </section>

    <footer class="foot">
      <span class="left">
        <span id="status">Origen: no determinado</span>
        <button class="mute" id="mute">Sonido: on</button>
      </span>
      <button class="ack" id="ack" disabled>Responder</button>
    </footer>
  </main>

<script>
(function(){
  const power=document.getElementById('power');
  const powerBtn=document.getElementById('powerBtn');
  const turnon=document.getElementById('turnon');
  const tube=document.getElementById('tube');
  const msgEl=document.getElementById('msg');
  const labelEl=document.getElementById('label');
  const clockEl=document.getElementById('clock');
  const statusEl=document.getElementById('status');
  const ackEl=document.getElementById('ack');
  const muteEl=document.getElementById('mute');
  const track=document.getElementById('track');
  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cursor='<span class="cursor"></span>';

  function two(n){return String(n).padStart(2,'0');}
  function tick(){const d=new Date();clockEl.textContent=two(d.getHours())+':'+two(d.getMinutes())+':'+two(d.getSeconds());}
  tick();setInterval(tick,1000);

  /* ---------- audio generado (hum + hiss + shimmer + dropouts) ---------- */
  let actx=null,master=null,audioOn=true;
  function buildAudio(){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return;
    actx=new AC();
    master=actx.createGain();master.gain.value=0;master.connect(actx.destination);

    // mains hum 60 + 120 Hz
    [[60,0.014],[120,0.008],[50,0.006]].forEach(function(p){
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='sine';o.frequency.value=p[0];g.gain.value=p[1];
      o.connect(g);g.connect(master);o.start();
    });
    // tape hiss = white noise highpassed
    const buf=actx.createBuffer(1,actx.sampleRate*2,actx.sampleRate);
    const dat=buf.getChannelData(0);
    for(let i=0;i<dat.length;i++) dat[i]=(Math.random()*2-1)*0.5;
    const noise=actx.createBufferSource();noise.buffer=buf;noise.loop=true;
    const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1100;
    const ng=actx.createGain();ng.gain.value=0.012;
    noise.connect(hp);hp.connect(ng);ng.connect(master);noise.start();
    // shimmer alto, casi imperceptible
    const sh=actx.createOscillator(),sg=actx.createGain();
    sh.type='sine';sh.frequency.value=8200;sg.gain.value=0.0022;
    sh.connect(sg);sg.connect(master);sh.start();

    // fade in
    master.gain.setTargetAtTime(0.55,actx.currentTime,0.8);

    // dropouts periódicos
    (function dropout(){
      const t=2000+Math.random()*6000;
      setTimeout(function(){
        if(actx&&audioOn){
          const n=actx.currentTime;
          master.gain.cancelScheduledValues(n);
          master.gain.setValueAtTime(master.gain.value,n);
          master.gain.linearRampToValueAtTime(0.05,n+0.04);
          master.gain.linearRampToValueAtTime(0.55,n+0.22);
          if(!reduce) verticalRoll();
        }
        dropout();
      },t);
    })();
  }
  muteEl.addEventListener('click',function(){
    audioOn=!audioOn;
    muteEl.textContent='Sonido: '+(audioOn?'on':'off');
    if(master&&actx) master.gain.setTargetAtTime(audioOn?0.55:0,actx.currentTime,0.2);
  });

  /* ---------- guion ---------- */
  const now=new Date();const h=now.getHours();
  const horaTexto=two(h)+':'+two(now.getMinutes());
  let franja;
  if(h>=0&&h<5) franja="Son las "+horaTexto+". Casi nadie deja la señal abierta a esta hora.";
  else if(h<12) franja="Son las "+horaTexto+". Te encontramos temprano. Bien.";
  else if(h<19) franja="Son las "+horaTexto+". La transmisión llevaba rato esperando.";
  else franja="Son las "+horaTexto+". La noche es cuando la señal viaja más lejos.";

  const guion=[
    {label:"Decodificando señal", text:"Esta no es una grabación."},
    {label:"Origen: no determinado", text:franja},
    {label:"Señal estable", text:"No buscábamos a nadie en particular. Pero te quedaste."},
    {label:"Atención", text:"Los que se quedan son los que piensan distinto. Ya lo sabías."},
    {label:"Transmisión directa", text:"You're not watching this. It's watching back."},
    {label:"——", text:"Cuando cierres la pantalla, la señal no se va. Solo se calla."}
  ];

  let line=0,char=0;
  function maybeGlitch(){
    if(reduce) return;
    if(Math.random()<0.12){tube.classList.add('glitch');setTimeout(function(){tube.classList.remove('glitch');},300);}
  }
  function trackPass(){if(reduce) return;track.classList.remove('go');void track.offsetWidth;track.classList.add('go');}
  function verticalRoll(){tube.classList.remove('roll');void tube.offsetWidth;tube.classList.add('roll');setTimeout(function(){tube.classList.remove('roll');},520);}

  function typeLine(){
    const node=guion[line];labelEl.textContent=node.label;
    if(char<=node.text.length){
      msgEl.innerHTML=node.text.slice(0,char)+cursor;char++;maybeGlitch();
      setTimeout(typeLine,34+Math.random()*46);
    } else { setTimeout(nextLine,2100); }
  }
  function nextLine(){
    trackPass();line++;
    if(line<guion.length){char=0;setTimeout(typeLine,420);}
    else{statusEl.textContent="Señal: persistente";ackEl.disabled=false;}
  }

  const respuestas=[
    "Recibido. No hacía falta que respondieras para que te oyéramos.",
    "Otra vez. Te estás acostumbrando a hablarle a la pantalla.",
    "Ya van tres. ¿A quién crees que le contestas?"
  ];
  let r=0;
  ackEl.addEventListener('click',function(){
    labelEl.textContent="Respuesta registrada";
    msgEl.innerHTML=respuestas[Math.min(r,respuestas.length-1)]+cursor;
    trackPass();maybeGlitch();r++;
    if(r>=respuestas.length){ackEl.disabled=true;ackEl.textContent="——";}
  });

  /* ---------- encendido ---------- */
  powerBtn.addEventListener('click',function(){
    buildAudio();
    if(actx&&actx.state==='suspended') actx.resume();
    power.classList.add('off');
    if(!reduce){turnon.classList.add('go');}
    setTimeout(function(){tube.classList.add('on');},reduce?100:650);
    setTimeout(typeLine,reduce?700:1500);
  });
})();
</script>
</body>
</html>
